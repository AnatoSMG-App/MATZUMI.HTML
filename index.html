<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MATZUMI - PROTOCOLO N5</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --azul-smg: #0066ff; --neon: #39ff14; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { text-align: center; padding: 15px 0; border-bottom: 2px solid var(--azul-smg); }
        .empresa { color: var(--azul-smg); font-size: 22px; font-weight: bold; }
        .matzumi { color: var(--neon); font-size: 28px; font-weight: bold; text-shadow: 0 0 10px var(--neon); }
        .radar-bar { display: flex; justify-content: space-between; padding: 10px 20px; background: #111; font-size: 14px; }
        
        #pantalla { flex-grow: 1; padding: 25px; display: flex; flex-direction: column; justify-content: center; text-align: center; font-size: 36px; line-height: 1.3; background: radial-gradient(circle, #1a1a1a, #000); }
        .texto-viejo { font-size: 18px; color: #666; margin-bottom: 10px; }

        .controles { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 15px; padding: 30px 20px; background: #050505; align-items: center; }
        .btn-round { border-radius: 50%; border: none; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-cam { background: #222; height: 75px; width: 75px; font-size: 28px; border: 1px solid #444; }
        .btn-mic { background: #aa0000; height: 105px; width: 105px; font-size: 50px; box-shadow: 0 0 15px #aa0000; position: relative; }
        
        .mic-on { background: var(--neon) !important; color: black !important; box-shadow: 0 0 30px var(--neon) !important; }
        .slider-safe { position: absolute; bottom: -15px; width: 60px; height: 8px; background: #333; border-radius: 4px; border: 1px solid #555; }
        .slider-rastro { position: absolute; left: 0; height: 100%; background: var(--neon); width: 0%; transition: 0.3s; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="empresa">MULTISERVICIO ANATO SMG</div>
        <div class="matzumi">MATZUMI</div>
    </div>
    <div class="radar-bar">
        <div>📍 LOS GUAYOS, CARABOBO</div>
        <div onclick="alert('Cambio manual de temperatura activado')">🌡️ 29°C ~</div>
    </div>
    <div id="pantalla">
        <div id="actual">LISTO PARA LA ORDEN, AMO.</div>
    </div>
    <div class="controles">
        <button class="btn-round btn-cam" onclick="alert('📸 FOTO DIRECTA')">📸</button>
        <button class="btn-round btn-mic" id="btn-mic" onmousedown="micDown()" onmouseup="micUp()">
            🎤
            <div class="slider-safe"><div id="rastro" class="slider-rastro"></div></div>
        </button>
        <button class="btn-round btn-cam" onclick="alert('🎥 VIDEO DIRECTO')">🎥</button>
    </div>
    <script>
        // Lógica de seguro de slider (simulación visual)
        let safeOn = false;
        function micDown() {
            if(!safeOn) {
                document.getElementById('btn-mic').classList.add('mic-on');
                document.getElementById('rastro').style.width = "100%";
                document.getElementById('actual').innerText = "ESCUCHANDO TOMA Y DAME...";
            }
        }
        function micUp() {
            if(!safeOn) {
                document.getElementById('btn-mic').classList.remove('mic-on');
                document.getElementById('rastro').style.width = "0%";
                document.getElementById('actual').innerText = "PROCESANDO CON EL EXCEL...";
            }
        }
    </script>
</body>
</html>
