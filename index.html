<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MATZUMI V3.6 - ENTRENAMIENTO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        :root { --azul: #0066ff; --neon: #39ff14; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Arial Black', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { text-align: center; padding: 10px; border-bottom: 2px solid var(--azul); }
        .matzumi { color: var(--neon); font-size: 32px; text-shadow: 0 0 10px var(--neon); }
        #pantalla { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; text-align: center; background: radial-gradient(circle, #1a1a1a, #000); }
        #status { font-size: 24px; text-transform: uppercase; line-height: 1.2; }
        .btn-mic { background: radial-gradient(circle, #cc0000, #770000); height: 110px; width: 110px; border-radius: 50%; border: 5px solid #444; display: flex; justify-content: center; align-items: center; font-size: 50px; margin: 30px auto; }
        .btn-mic.active { background: var(--neon); box-shadow: 0 0 40px var(--neon); }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 10px; color: var(--azul);">MULTISERVICIO ANATO SMG</div>
        <div class="matzumi">MATZUMI</div>
    </div>
    <div id="pantalla">
        <div id="status">DÍGAME: "GRABA BUENOS DÍAS"</div>
    </div>
    <div class="btn-mic" id="micBtn">🎙️</div>

    <script>
        const st = document.getElementById('status');
        const btn = document.getElementById('micBtn');

        // MEMORIA DINÁMICA (Local)
        let memoria = JSON.parse(localStorage.getItem('brain_m')) || {
            "jose": "La Daewoo es de Joseíto, está muy dañada.",
            "gabriel": "El Artic es del señor Gabriel."
        };

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.classList.add('active');
                st.innerText = "ESCUCHANDO...";
                recognition.start();
            });

            recognition.onresult = (event) => {
                btn.classList.remove('active');
                const frase = event.results[0][0].transcript.toLowerCase();

                // LÓGICA DE GRABACIÓN DIRECTA
                if (frase.includes("graba")) {
                    if (frase.includes("buenos días")) {
                        memoria["buenos días"] = "Buenos días, amo.";
                    } else if (frase.includes("reina")) {
                        memoria["hola reina"] = "Hola rey.";
                    }
                    localStorage.setItem('brain_m', JSON.stringify(memoria));
                    responder("COPIADO, AMO. YA ME LO APRENDÍ: " + frase.replace("graba", ""));
                    return;
                }

                // BUSCAR EN MEMORIA
                let encontrada = false;
                for (let clave in memoria) {
                    if (frase.includes(clave)) {
                        responder(memoria[clave]);
                        encontrada = true;
                        break;
                    }
                }

                if (!encontrada) {
                    responder("NO TENGO ESA INFO. ¿LA GRABAMOS?");
                }
            };
        }

        function responder(t) {
            st.innerText = t;
            const msj = new SpeechSynthesisUtterance(t);
            msj.lang = 'es-ES';
            window.speechSynthesis.speak(msj);
        }
    </script>
</body>
</html>
