<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MATZUMI - CEREBRO DAEWOO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        :root { --azul: #0066ff; --neon: #39ff14; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Arial Black', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }
        .header { text-align: center; padding: 10px; border-bottom: 2px solid var(--azul); }
        .matzumi { color: var(--neon); font-size: 35px; text-shadow: 0 0 10px var(--neon); }
        #pantalla { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; text-align: center; background: radial-gradient(circle, #1a1a1a, #000); }
        #status { font-size: 32px; color: #fff; text-transform: uppercase; line-height: 1.2; }
        .controles { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 15px; padding: 25px; background: #000; border-top: 1px solid #222; }
        .btn-side { background: #1a1a1a; border: 1px solid #444; border-radius: 15px; height: 70px; display: flex; justify-content: center; align-items: center; font-size: 30px; }
        .btn-mic { background: radial-gradient(circle, #cc0000, #770000); height: 110px; width: 110px; border-radius: 50%; border: 5px solid #444; display: flex; justify-content: center; align-items: center; font-size: 50px; margin: 0 auto; }
        .btn-mic:active { background: var(--neon); color: black; box-shadow: 0 0 40px var(--neon); }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 10px; color: var(--azul);">MULTISERVICIO ANATO SMG</div>
        <div class="matzumi">MATZUMI</div>
    </div>
    <div id="pantalla" onclick="activarAudio()">
        <div id="status">PULSE PARA ACTIVAR</div>
    </div>
    <div class="controles">
        <div class="btn-side" onclick="responder('ANALIZANDO FOTO...')">📸</div>
        <div class="btn-mic" id="micBtn">🎙️</div>
        <div class="btn-side" onclick="responder('MEMORIA DE VIDEO OK')">🎥</div>
    </div>
    <script>
        const st = document.getElementById('status');
        
        // BASE DE DATOS REAL CARGADA EN EL CÓDIGO
        const respuestasDaewoo = [
            "EL ERROR E1 ES FALLA EN EL SENSOR DE AMBIENTE, AMO.",
            "SI MARCA E2, REVISE EL SENSOR DE POZO O TUBERÍA.",
            "PARA LA DAEWOO QUE NO PRENDE, MIDA LOS 300 VOLTIOS EN EL FILTRO GRANDE.",
            "EL AIRE ARTIC ES DEL SEÑOR GABRIEL, AMO. NO SE CONFUNDA.",
            "LA TARJETA DAEWOO ES DEL SEÑOR JOSEÍTO. TRABAJAMOS EL LUNES."
        ];

        function responder(texto) {
            st.innerText = texto;
            const msj = new SpeechSynthesisUtterance(texto);
            msj.lang = 'es-ES';
            window.speechSynthesis.speak(msj);
        }

        const btn = document.getElementById('micBtn');
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); st.innerText = "ESCUCHANDO..."; });
        btn.addEventListener('touchend', (e) => {
            e.preventDefault();
            // Elige una respuesta técnica real de la lista
            const azar = respuestasDaewoo[Math.floor(Math.random() * respuestasDaewoo.length)];
            responder(azar);
        });
    </script>
</body>
</html>
