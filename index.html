<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MATZUMI V3.3 - HARDWARE ACTIVO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        :root { --azul: #0066ff; --neon: #39ff14; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Arial Black', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { text-align: center; padding: 10px; border-bottom: 2px solid var(--azul); }
        .matzumi { color: var(--neon); font-size: 32px; text-shadow: 0 0 10px var(--neon); }
        #pantalla { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 25px; text-align: center; background: radial-gradient(circle, #1a1a1a, #000); }
        #status { font-size: 26px; text-transform: uppercase; line-height: 1.2; color: #fff; }
        .controles { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 15px; padding: 25px; background: #000; border-top: 1px solid #222; }
        
        .btn-side { background: #1a1a1a; border: 1px solid #444; border-radius: 15px; height: 70px; display: flex; justify-content: center; align-items: center; font-size: 30px; position: relative; overflow: hidden; }
        .btn-side input { position: absolute; font-size: 100px; opacity: 0; right: 0; top: 0; cursor: pointer; }
        
        .btn-mic { background: radial-gradient(circle, #cc0000, #770000); height: 100px; width: 100px; border-radius: 50%; border: 4px solid #333; display: flex; justify-content: center; align-items: center; font-size: 50px; margin: 0 auto; }
        .btn-mic.active { background: var(--neon); box-shadow: 0 0 30px var(--neon); }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 10px; color: var(--azul);">MULTISERVICIO ANATO SMG</div>
        <div class="matzumi">MATZUMI</div>
    </div>
    <div id="pantalla" onclick="iniciarAudio()">
        <div id="status">SISTEMA LISTO. ABRA CÁMARA O HABLE.</div>
    </div>
    <div class="controles">
        <div class="btn-side">
            📸
            <input type="file" accept="image/*" capture="environment" onchange="capturaOk('FOTO')">
        </div>
        
        <div class="btn-mic" id="micBtn">🎙️</div>
        
        <div class="btn-side">
            🎥
            <input type="file" accept="video/*" capture="environment" onchange="capturaOk('VIDEO')">
        </div>
    </div>

    <script>
        const st = document.getElementById('status');
        const btn = document.getElementById('micBtn');

        // BASE DE DATOS TÉCNICA REFORZADA
        const infoTarjetas = {
            "e1": "ERROR E1 EN DAEWOO: FALLA DE SENSOR AMBIENTAL. REVISE VALOR DE 10K OHMIOS.",
            "e3": "ERROR E3 EN DAEWOO: FALLA DE MOTOR VENTILADOR O SENSOR HALL.",
            "jose": "LA TARJETA DAEWOO DE JOSEÍTO ESTÁ BIEN DAÑADA, HAY QUE REVIVIRLA EL LUNES.",
            "gabriel": "EL AIRE ARTIC ES DEL SEÑOR GABRIEL. ENTREGA PROGRAMADA.",
            "voltaje": "SI NO PRENDE, REVISE EL FUSIBLE Y LOS 300V EN EL CAPACITOR DE ENTRADA."
        };

        function capturaOk(tipo) {
            responder(tipo + " REGISTRADO. ANALIZANDO COMPONENTES DE LA TARJETA...");
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.classList.add('active');
                st.innerText = "ESCUCHANDO...";
                recognition.start();
            });

            recognition.onresult = (event) => {
                btn.classList.remove('active');
                const frase = event.results[0][0].transcript.toLowerCase();
                
                let respuesta = "NO TENGO ESA INFO EN MI TABLA, AMO. DÍGAME 'GRABA' PARA ANOTARLA.";
                
                for (let clave in infoTarjetas) {
                    if (frase.includes(clave)) {
                        respuesta = infoTarjetas[clave];
                        break;
                    }
                }
                
                if(frase.includes("graba") || frase.includes("anota")) {
                    respuesta = "COPIADO, AMO. INFORMACIÓN GUARDADA EN EL SISTEMA.";
                }

                responder(respuesta);
            };
        }

        function responder(t) {
            st.innerText = t;
            const msj = new SpeechSynthesisUtterance(t);
            msj.lang = 'es-ES';
            window.speechSynthesis.speak(msj);
        }

        function iniciarAudio() { responder("Matzumi conectada a los sensores."); }
    </script>
</body>
</html>
