<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MATZUMI V3.5 - TIEMPO REAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        :root { --azul: #0066ff; --neon: #39ff14; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Arial Black', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { text-align: center; padding: 10px; border-bottom: 2px solid var(--azul); }
        .matzumi { color: var(--neon); font-size: 32px; text-shadow: 0 0 10px var(--neon); }
        #pantalla { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; text-align: center; background: radial-gradient(circle, #1a1a1a, #000); position: relative; }
        
        /* CRONÓMETRO */
        #timer { font-size: 60px; color: #ff0000; font-family: 'Courier New', monospace; display: none; margin-bottom: 20px; }
        #status { font-size: 26px; text-transform: uppercase; line-height: 1.2; }
        
        .controles { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 15px; padding: 25px; background: #000; border-top: 1px solid #222; }
        .btn-side { background: #1a1a1a; border: 1px solid #444; border-radius: 15px; height: 70px; display: flex; justify-content: center; align-items: center; font-size: 30px; position: relative; overflow: hidden; }
        .btn-side input { position: absolute; font-size: 100px; opacity: 0; cursor: pointer; }
        .btn-mic { background: radial-gradient(circle, #cc0000, #770000); height: 100px; width: 100px; border-radius: 50%; border: 4px solid #333; display: flex; justify-content: center; align-items: center; font-size: 50px; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 10px; color: var(--azul);">MULTISERVICIO ANATO SMG</div>
        <div class="matzumi">MATZUMI</div>
    </div>
    <div id="pantalla">
        <div id="timer">05</div>
        <div id="status">LISTA PARA EL TRABAJO, AMO.</div>
    </div>
    <div class="controles">
        <div class="btn-side">📸<input type="file" accept="image/*" capture="environment" onchange="iniciarProceso('FOTO')"></div>
        <div class="btn-mic" id="micBtn">🎙️</div>
        <div class="btn-side">🎥<input type="file" accept="video/*" capture="environment" onchange="iniciarProceso('VIDEO')"></div>
    </div>

    <script>
        const st = document.getElementById('status');
        const timerDisplay = document.getElementById('timer');
        const btn = document.getElementById('micBtn');

        function iniciarProceso(tipo) {
            st.innerText = "ANALIZANDO " + tipo + "...";
            iniciarCronometro();
        }

        function iniciarCronometro() {
            let tiempo = 5;
            timerDisplay.style.display = "block";
            timerDisplay.innerText = "0" + tiempo;
            
            const cuenta = setInterval(() => {
                tiempo--;
                timerDisplay.innerText = "0" + tiempo;
                if (tiempo <= 0) {
                    clearInterval(cuenta);
                    timerDisplay.style.display = "none";
                    consultarGemini();
                }
            }, 1000);
        }

        function consultarGemini() {
            st.innerText = "CONSULTANDO CON GÉMINIS...";
            responder("Amo, no tengo esa respuesta en mi memoria local. ¿Quiere que le pregunte a mi compi Géminis por la solución?");
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                st.innerText = "ESCUCHANDO...";
                recognition.start();
            });

            recognition.onresult = (event) => {
                const frase = event.results[0][0].transcript.toLowerCase();
                if (frase.includes("jose")) {
                    responder("Esa Daewoo es de Joseíto, está muy dañada.");
                } else {
                    iniciarCronometro(); // Si no sabe, activa el reloj para buscar
                }
            };
        }

        function responder(t) {
            st.innerText = t;
            const msj = new SpeechSynthesisUtterance(t);
            msj.lang = 'es-ES';
            window.speechSynthesis.speak(msj);
        }
    </script>
</body>
</html>
