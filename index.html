<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATZUMI V18 - CEREBRO SMG</title>
    <style>
        :root { --neon: #00f2ff; --green: #2ecc71; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; }
        .header { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 5px; }
        .sensors { display: flex; justify-content: space-between; background: #111; padding: 8px; border-radius: 5px; font-size: 12px; margin-top: 5px; border: 1px solid #333; }
        
        #monitor { 
            background: #000; border: 2px solid var(--green); height: 180px; 
            border-radius: 8px; padding: 12px; overflow-y: auto; color: var(--green); 
            font-family: 'Consolas', monospace; font-size: 14px; box-shadow: inset 0 0 15px #003300; margin: 10px 0;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex-grow: 1; }
        .btn-smg { 
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border: 1px solid #444; color: white; border-radius: 12px; 
            padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-smg:active { background: var(--green); color: black; box-shadow: 0 0 15px var(--green); }
        .btn-smg small { font-size: 9px; color: var(--neon); margin-top: 4px; }
        .back-btn { grid-column: span 2; background: #331111; border-color: #ff4444; }

        .footer { display: flex; justify-content: space-around; align-items: center; padding: 10px; background: #111; border-radius: 20px 20px 0 0; }
        .mic-btn { width: 70px; height: 70px; background: var(--green); color: black; border-radius: 50%; border: none; font-size: 30px; box-shadow: 0 0 20px var(--green); }
    </style>
</head>
<body>

<div class="header">
    <div style="color: var(--neon); font-size: 18px; font-weight: bold;">MULTISERVICIOS ANATO SMG</div>
    <div style="color: var(--green); font-size: 13px;">ASISTENTE MATZUMI V18</div>
</div>

<div class="sensors">
    <span>📍 LOS GUAYOS, CARABOBO</span>
    <span id="temp-val">🌡️ 25°C</span>
</div>

<div id="monitor">> MATZUMI ONLINE, AMO.<br>> LISTA PARA EL MANTENIMIENTO.<br>> ¿QUÉ REFRIGERANTE ESTAMOS CARGANDO?</div>

<div id="menu-main" class="grid">
    <button class="btn-smg" onclick="showSub('AIRES')">❄️ AIRES<br><small>FALLAS / MARCAS</small></button>
    <button class="btn-smg" onclick="showSub('PRESIONES')">📊 PRESIONES<br><small>CALCULAR R410 / R22</small></button>
    <button class="btn-smg" onclick="showSub('LBLANCA')">🧊 L. BLANCA<br><small>NEVERAS / BM</small></button>
    <button class="btn-smg" onclick="showSub('PROTO')">🛡️ PROTOCOLO<br><small>JVTRONIC</small></button>
</div>

<div id="menu-aires" class="grid" style="display:none;">
    <button class="btn-smg" onclick="calc('BTU12')">12K BTU</button>
    <button class="btn-smg" onclick="calc('BTU18')">18K BTU</button>
    <button class="btn-smg" onclick="data('GREEN')">GREEN PLUS</button>
    <button class="btn-smg" onclick="data('DAMASCO')">DAMASCO</button>
    <button class="btn-smg back-btn" onclick="goBack()">⬅️ VOLVER AL INICIO</button>
</div>

<div id="menu-presiones" class="grid" style="display:none;">
    <button class="btn-smg" onclick="calcPresion('R410A')">R410A</button>
    <button class="btn-smg" onclick="calcPresion('R22')">R22</button>
    <button class="btn-smg back-btn" onclick="goBack()">⬅️ VOLVER AL INICIO</button>
</div>

<div class="footer">
    <button class="btn-smg" style="width:50px; height:50px;" onclick="location.reload()">🔄</button>
    <button class="mic-btn" onclick="speak('Dígame, amo. ¿Qué marca o presión necesita saber?')">🎤</button>
    <button class="btn-smg" style="width:50px; height:50px;" onclick="speak('Bitácora SMG activa')">📂</button>
</div>

<script>
    const mon = document.getElementById('monitor');
    const tempAmbiente = 25; // Temperatura de Los Guayos

    function speak(t) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'es-ES'; u.rate = 1; u.pitch = 1.1;
        window.speechSynthesis.speak(u);
    }

    function showSub(cat) {
        document.getElementById('menu-main').style.display = 'none';
        if(cat==='AIRES') document.getElementById('menu-aires').style.display = 'grid';
        if(cat==='PRESIONES') document.getElementById('menu-presiones').style.display = 'grid';
        speak("Accediendo a " + cat);
    }

    function goBack() {
        document.getElementById('menu-aires').style.display = 'none';
        document.getElementById('menu-presiones').style.display = 'none';
        document.getElementById('menu-main').style.display = 'grid';
    }

    function calcPresion(gas) {
        let pBaja = 0;
        let pAlta = 0;
        let msg = "";

        if(gas === 'R410A') {
            // Lógica: A 25°C amb, la baja suele estar entre 115-125
            pBaja = 115 + (tempAmbiente - 20) * 1.5;
            msg = `Amo, para R410A con ${tempAmbiente} grados, la presión de baja ideal es de ${pBaja.toFixed(0)} PSI.`;
        } else if(gas === 'R22') {
            pBaja = 60 + (tempAmbiente - 20) * 0.8;
            msg = `Para R22 con ${tempAmbiente} grados, mantenga la baja en ${pBaja.toFixed(0)} PSI.`;
        }

        mon.innerHTML = `> CALCULADORA SMG<br>> GAS: ${gas}<br>> TEMP: ${tempAmbiente}°C<br>> BAJA SUGERIDA: ${pBaja.toFixed(0)} PSI`;
        speak(msg);
    }

    function data(marca) {
        let d = "";
        if(marca === 'GREEN') d = "Falla Green Plus: E6 es error de comunicación. Revise cable de señal.";
        if(marca === 'DAMASCO') d = "Damasco: Sensores de 5k y 10k. Revise capacitor de arranque.";
        mon.innerHTML = `> DATA MARCA: ${marca}<br>> ${d}`;
        speak(d);
    }

    function calc(btu) {
        speak("Analizando capacidad de " + btu + " btu.");
        mon.innerHTML = `> CAPACIDAD: ${btu}<br>> R410A: 115-125 PSI<br>> R22: 65-70 PSI`;
    }
</script>
</body>
</html>
