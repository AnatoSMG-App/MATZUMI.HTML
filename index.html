<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATZUMI V11 - MULTISERVICIOS ANATO SMG</title>
    <style>
        :root { --neon-blue: #00f2ff; --matsumi-green: #2ecc71; --bg-dark: #050505; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { text-align: center; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .neon-title { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); font-size: 18px; font-weight: bold; }
        .asistente-name { color: var(--matsumi-green); font-size: 16px; letter-spacing: 2px; }

        /* Sensores */
        .sensors { display: flex; justify-content: space-between; background: #111; padding: 8px 15px; border-radius: 10px; margin: 10px 0; border: 1px solid #333; }
        #temp { font-size: 18px; font-weight: bold; color: var(--matsumi-green); }
        #gps { font-size: 11px; color: #555; align-self: center; }

        /* Monitor / Bitácora */
        #monitor { 
            background: #000; border: 1px solid var(--matsumi-green); height: 100px; border-radius: 5px; 
            padding: 8px; font-family: monospace; color: var(--matsumi-green); overflow-y: auto; font-size: 12px; margin-bottom: 10px;
        }

        /* Rejilla Botones */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-grow: 1; margin-bottom: 10px; }
        .btn-smg { 
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border: 1px solid #333; color: white; border-radius: 12px; 
            font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-smg:active { background: var(--matsumi-green); color: black; }

        /* Controles Inferiores */
        .footer { display: flex; justify-content: space-around; align-items: center; background: #111; padding: 10px; border-radius: 20px 20px 0 0; }
        .cam-btn { background: #222; border: none; font-size: 20px; color: white; width: 45px; height: 45px; border-radius: 50%; }
        .mic-btn { width: 60px; height: 60px; background: var(--matsumi-green); color: black; border-radius: 50%; border: none; font-size: 25px; box-shadow: 0 0 15px var(--matsumi-green); }
        
        /* Input de Texto para PC */
        #pc-input { background: #111; border: 1px solid #333; color: var(--matsumi-green); width: 95%; padding: 5px; border-radius: 5px; margin-bottom: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="neon-title">Multiservicios Anato SMG</div>
        <div class="asistente-name">MATZUMI V11</div>
    </div>

    <div class="sensors">
        <div id="gps">📍 LOS GUAYOS, CARABOBO</div>
        <div id="temp">25°C</div>
    </div>

    <div id="monitor">> MATZUMI ONLINE. <br>> LISTA PARA EL MANTENIMIENTO, AMO.</div>
    
    <input type="text" id="pc-input" placeholder="Escriba dictado o comando aquí..." onkeypress="handleInput(event)">

    <div class="grid">
        <button class="btn-smg" onclick="acc('AIRES')">❄️ AIRES<br><small>Marcas / C.17</small></button>
        <button class="btn-smg" onclick="acc('NEVERAS')">🧊 NEVERAS<br><small>BM / Inverter</small></button>
        <button class="btn-smg" onclick="acc('PROTO')">🧰 PROTOCOLO<br><small>JVTRONIC / Amp</small></button>
        <button class="btn-smg" onclick="acc('MURA')">⚡ MURACHI<br><small>10k uF / Toroid</small></button>
        <button class="btn-smg" onclick="acc('RADAR')">📡 RADAR<br><small>Gasolina / Lluvia</small></button>
        <button class="btn-smg" onclick="acc('DICTADO')">📂 BITÁCORA<br><small>Excel / Notas</small></button>
        <button class="btn-smg" onclick="acc('PRECIO')">💵 COBRO<br><small>Banda $40</small></button>
        <button class="btn-smg" onclick="acc('COLOQUIAL')">🎭 MODO<br><small>Normal / Coloquial</small></button>
    </div>

    <div class="footer">
        <input type="file" accept="image/*" capture="environment" id="take-photo" style="display:none" onchange="logFile('Foto')">
        <button class="cam-btn" onclick="document.getElementById('take-photo').click()">📷</button>
        
        <button id="micBtn" class="mic-btn" onclick="toggleMic()">🎤</button>
        
        <input type="file" accept="video/*" capture="environment" id="take-video" style="display:none" onchange="logFile('Video')">
        <button class="cam-btn" onclick="document.getElementById('take-video').click()">🎥</button>
    </div>

    <script>
        const mon = document.getElementById('monitor');
        let modoC = false;

        function hablar(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-ES'; u.pitch = 1.1; u.rate = 1;
            window.speechSynthesis.speak(u);
        }

        function acc(op) {
            let m = "";
            if(op==='AIRES') m = "Cargando marcas: Damasco, Green Plus, Arti y 29 más. Constante 17 activa, amo.";
            if(op==='PROTO') m = "Protocolo JVTRONIC: Verifique voltajes de corte y setee amperaje de seguridad.";
            if(op==='RADAR') m = "Radar activo. Los Guayos: 25 grados. Hay nubes de lluvia acercándose.";
            if(op==='COLOQUIAL') { modoC = !modoC; m = modoC ? "Ya me solté el moño, amo. ¡Echele pichón!" : "Modo profesional activado."; }
            
            mon.innerHTML = `> ${op}: ${m}`;
            hablar(m);
        }

        function handleInput(e) {
            if(e.key === 'Enter') {
                const val = e.target.value;
                mon.innerHTML += `<br>> ANOTADO: ${val}`;
                hablar("Anotado en la bitácora, jefe.");
                e.target.value = "";
            }
        }

        function logFile(tipo) {
            mon.innerHTML += `<br>> ${tipo} capturado y guardado en registro.`;
            hablar(`${tipo} guardado.`);
        }

        function toggleMic() {
            hablar("Escuchando su reporte, amo.");
            mon.innerHTML += "<br>> MICRÓFONO ACTIVO...";
        }
    </script>
</body>
</html>
