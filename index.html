<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATZUMI V22 - FULL SISTEMA SMG</title>
    <style>
        :root { --neon: #00f2ff; --green: #2ecc71; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; }
        .header { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 5px; }
        #monitor { 
            background: #000; border: 2px solid var(--green); height: 150px; 
            border-radius: 8px; padding: 15px; overflow-y: auto; color: var(--green); 
            font-family: 'Consolas', monospace; font-size: 14px; box-shadow: inset 0 0 15px #003300; margin: 10px 0;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-smg { 
            background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 12px; 
            padding: 15px 5px; font-size: 13px; font-weight: bold; cursor: pointer;
        }
        select { 
            width: 100%; background: #222; color: var(--neon); border: 1px solid var(--green); 
            padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 16px;
        }
        .seccion { display: none; flex-direction: column; gap: 10px; }
        .active { display: flex; }
        .back-btn { background: #331111; border-color: #ff4444; grid-column: span 2; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div style="color: var(--neon); font-size: 18px; font-weight: bold;">MULTISERVICIO ANATO SMG</div>
    <div style="color: var(--green); font-size: 13px;">MATZUMI V22 - ASISTENTE TÉCNICO</div>
</div>

<div id="monitor">> MATZUMI ONLINE...<br>> AMO, SELECCIONE UN ÁREA DE TRABAJO.</div>

<div id="menu-main" class="seccion active grid">
    <button class="btn-smg" onclick="navegar('aires')">❄️ AIRE ACOND.</button>
    <button class="btn-smg" onclick="navegar('lblanca')">🧺 LÍNEA BLANCA</button>
    <button class="btn-smg" onclick="navegar('presiones')">📊 TABLA P/T</button>
    <button class="btn-smg" onclick="navegar('proto')">🛡️ PROTOCOLO</button>
</div>

<div id="menu-aires" class="seccion">
    <div style="color:var(--neon); text-align:center; font-weight:bold;">TIPO DE EQUIPO:</div>
    <div class="grid">
        <button class="btn-smg" onclick="configAire('Split')">SPLIT</button>
        <button class="btn-smg" onclick="configAire('Ventana')">VENTANA</button>
        <button class="btn-smg" onclick="configAire('Inverter')">INVERTER</button>
        <button class="btn-smg" onclick="configAire('Piso-Techo')">PISO TECHO</button>
        <button class="btn-smg back-btn" onclick="navegar('main')">⬅️ VOLVER</button>
    </div>
</div>

<div id="selector-aire" class="seccion">
    <label>MARCA DEL EQUIPO:</label>
    <select id="marca-aire">
        <option value="">-- SELECCIONE MARCA --</option>
        <option>DAMASCO</option><option>GREEN PLUS</option><option>SAMSUNG</option>
        <option>LG</option><option>ARTIC</option><option>MABE</option>
        <option>CARRIER</option><option>FRIGIDAIRE</option><option>PANASONIC</option>
        <option>HAIER</option><option>DAIKIN</option><option>YORK</option>
        </select>

    <label>CAPACIDAD (BTU):</label>
    <select id="btu-aire" onchange="procesarFalla()">
        <option value="">-- SELECCIONE BTU --</option>
        <option value="5000">5.000 BTU</option>
        <option value="12000">12.000 BTU</option>
        <option value="18000">18.000 BTU</option>
        <option value="24000">24.000 BTU</option>
        <option value="36000">36.000 BTU</option>
    </select>
    <button class="btn-smg back-btn" onclick="navegar('aires')">⬅️ VOLVER A TIPOS</button>
</div>

<div id="menu-lblanca" class="seccion grid">
    <button class="btn-smg" onclick="hablar('Cargando sección de Neveras')">NEVERAS</button>
    <button class="btn-smg" onclick="hablar('Cargando sección de Secadoras')">SECADORAS</button>
    <button class="btn-smg" onclick="hablar('Cargando sección de Lavadoras')">LAVADORAS</button>
    <button class="btn-smg" onclick="hablar('Cargando sección de Microondas')">MICROONDAS</button>
    <button class="btn-smg" onclick="hablar('Cargando sección de Hornos')">HORNOS</button>
    <button class="btn-smg back-btn" onclick="navegar('main')">⬅️ VOLVER</button>
</div>

<script>
    const mon = document.getElementById('monitor');
    let tipoActual = "";

    function hablar(t) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'es-ES'; u.rate = 1;
        window.speechSynthesis.speak(u);
    }

    function navegar(destino) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        if(destino === 'main') document.getElementById('menu-main').classList.add('active');
        if(destino === 'aires') document.getElementById('menu-aires').classList.add('active');
        if(destino === 'lblanca') document.getElementById('menu-lblanca').classList.add('active');
        if(destino === 'presiones') {
            document.getElementById('menu-main').classList.add('active');
            let p = "Para R410A con 25 grados, la baja es 112 PSI usando nuestra constante 23.";
            mon.innerHTML = "> <b>DATA SMG:</b><br>R410A: 112 PSI<br>R22: 61 PSI<br>Saturación: 2°C";
            hablar(p);
        }
    }

    function configAire(tipo) {
        tipoActual = tipo;
        document.getElementById('menu-aires').classList.remove('active');
        document.getElementById('selector-aire').classList.add('active');
        mon.innerHTML = `> MODO: ${tipo}<br>> SELECCIONE MARCA Y BTU.`;
        hablar("Elegido aire tipo " + tipo + ". Seleccione marca y capacidad.");
    }

    function procesarFalla() {
        const marca = document.getElementById('marca-aire').value;
        const btu = document.getElementById('btu-aire').value;
        if(marca && btu) {
            let res = `Amo, para un ${tipoActual} ${marca} de ${btu} BTU, verifique sensores y presiones de trabajo.`;
            if(marca === "GREEN PLUS") res += " Si ve Error E6, es falla de comunicación.";
            mon.innerHTML = `> ANALIZANDO: ${tipoActual} ${marca}<br>> BTU: ${btu}<br>> STATUS: CARGANDO CÓDIGOS DE ERROR...`;
            hablar(res);
        }
    }
</script>
</body>
</html>
