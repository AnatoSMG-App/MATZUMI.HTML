<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MATZUMI - MEMORIA ACTIVA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        :root { --azul: #0066ff; --neon: #39ff14; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Arial Black', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }
        .header { text-align: center; padding: 10px; border-bottom: 2px solid var(--azul); background: #000; }
        .matzumi { color: var(--neon); font-size: 32px; font-weight: bold; text-shadow: 0 0 10px var(--neon); }
        #pantalla { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; text-align: center; background: radial-gradient(circle, #1a1a1a, #000); }
        #status { font-size: 28px; color: #fff; text-transform: uppercase; line-height: 1.2; min-height: 100px; }
        .controles { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 15px; padding: 25px; background: #000; border-top: 1px solid #222; }
        .btn-side { background: #1a1a1a; border: 1px solid #444; border-radius: 15px; height: 70px; display: flex; justify-content: center; align-items: center; font-size: 30px; }
        .btn-mic { background: radial-gradient(circle, #cc0000, #770000); height: 105px; width: 105px; border-radius: 50%; border: 4px solid #333; display: flex; justify-content: center; align-items: center; font-size: 50px; margin: 0 auto; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .btn-mic.active { background: var(--neon); color: black; box-shadow: 0 0 40px var(--neon); }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 10px; color: var(--azul);">MULTISERVICIO ANATO SMG</div>
        <div class="matzumi">MATZUMI</div>
    </div>
    <div id="pantalla">
        <div id="status">PULSE EL MICRÓFONO Y HABLE, AMO</div>
    </div>
    <div class="controles">
        <div class="btn-side">📸</div>
        <div class="btn-mic" id="micBtn">🎙️</div>
        <div class="btn-side">🎥</div>
    </div>

    <script>
        const st = document.getElementById('status');
        const btn = document.getElementById('micBtn');

        // Configuración del Reconocimiento de Voz
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.classList.add('active');
                st.innerText = "ESCUCHANDO...";
                recognition.start();
            });

            recognition.onresult = (event) => {
                const result = event.results[0][0].transcript;
                st.innerText = "ANOTADO: " + result.toUpperCase();
                hablar("Entendido amo, estoy guardando eso en el reporte del cliente.");
                btn.classList.remove('active');
            };

            recognition.onerror = () => {
                btn.classList.remove('active');
                st.innerText = "ERROR DE AUDIO. INTENTE DE NUEVO.";
            };
        }

        function hablar(texto) {
            const msj = new SpeechSynthesisUtterance(texto);
            msj.lang = 'es-ES';
            window.speechSynthesis.speak(msj);
        }
    </script>
</body>
</html>
