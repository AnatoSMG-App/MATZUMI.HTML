<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MATZUMI - PROTOCOLO GENESIS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        :root { --azul-smg: #0066ff; --neon: #39ff14; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Prevenir que se seleccione el texto o imágenes */
        * { -webkit-tap-highlight-color: transparent; user-select: none; }

        .header { text-align: center; padding: 10px; border-bottom: 2px solid var(--azul-smg); background: #000; }
        .empresa { color: var(--azul-smg); font-size: 18px; font-weight: bold; letter-spacing: 2px; }
        .matzumi { color: var(--neon); font-size: 32px; font-weight: bold; text-shadow: 0 0 15px var(--neon); }
        
        .radar-status { display: flex; justify-content: space-between; padding: 8px 15px; background: #111; font-size: 12px; border-bottom: 1px solid #333; }

        #pantalla { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; font-size: 28px; background: radial-gradient(circle, #111 0%, #000 100%); }
        .msg-actual { border-left: 3px solid var(--neon); padding-left: 15px; }

        .controles { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 10px; padding: 20px; background: #000; border-top: 1px solid #222; align-items: center; }
        
        /* Botones de acción con input oculto para forzar cámara */
        .btn-side { background: #1a1a1a; border: 1px solid #444; border-radius: 50%; height: 70px; width: 70px; display: flex; justify-content: center; align-items: center; position: relative; }
        .btn-side input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .btn-principal { background: #800; height: 110px; width: 110px; border-radius: 50%; border: 4px solid #333; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.2s; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        .btn-principal:active { transform: scale(0.95); background: var(--neon); color: black; box-shadow: 0 0 40px var(--neon); border-color: white; }

        .label-mic { font-size: 10px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div class="empresa">MULTISERVICIO ANATO SMG</div>
        <div class="matzumi">MATZUMI</div>
    </div>
    
    <div class="radar-status">
        <div>📍 LOS GUAYOS | RADAR OK</div>
        <div>🌡️ <span id="temp">27</span>°C [CALIBRADO]</div>
    </div>

    <div id="pantalla">
        <div class="msg-actual" id="status">LISTO PARA LA ORDEN, AMO.</div>
    </div>

    <div class="controles">
        <div class="btn-side">
            <span style="font-size: 30px;">📸</span>
            <input type="file" accept="image/*" capture="environment" onchange="updateMsg('FOTO CAPTURADA')">
        </div>

        <div class="btn-principal" id="mic" oncontextmenu="return false;">
            <span style="font-size: 45px;">🎤</span>
            <div class="label-mic">PUSH TO TALK</div>
        </div>

        <div class="btn-side">
            <span style="font-size: 30px;">🎥</span>
            <input type="file" accept="video/*" capture="environment" onchange="updateMsg('VIDEO GRABADO')">
        </div>
    </div>

    <script>
        const status = document.getElementById('status');
        const mic = document.getElementById('mic');

        function updateMsg(txt) { status.innerText = txt; }

        // Manejo del micrófono táctil puro
        mic.addEventListener('touchstart', (e) => {
            e.preventDefault();
            updateMsg("GRABANDO PROCESO EN EXCEL...");
        });

        mic.addEventListener('touchend', (e) => {
            e.preventDefault();
            updateMsg("DATOS ENVIADOS A MATZUMI.");
            setTimeout(() => updateMsg("ESPERANDO SIGUIENTE PASO..."), 2000);
        });

        // Prevenir menús contextuales en toda la app
        window.oncontextmenu = function(event) {
             event.preventDefault();
             event.stopPropagation();
             return false;
        };
    </script>
</body>
</html>
