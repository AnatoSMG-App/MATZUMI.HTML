<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MATZUMI - ANATO SMG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --azul-smg: #0066ff; --neon-matz: #39ff14; --bg: #050505; }
        body { 
            background: var(--bg); color: white; font-family: Arial, sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        /* ENCABEZADO FIJO */
        .header { text-align: center; padding: 20px 0 10px 0; border-bottom: 2px solid var(--azul-smg); }
        .empresa { color: var(--azul-smg); font-size: 22px; font-weight: bold; text-transform: uppercase; }
        .matzumi { color: var(--neon-matz); font-size: 32px; font-weight: bold; text-shadow: 0 0 15px var(--neon-matz); }
        
        /* RADAR DINÁMICO */
        .radar { 
            display: flex; justify-content: space-between; padding: 12px 25px; 
            background: #111; font-weight: bold; font-size: 15px; border-bottom: 1px solid #222;
        }

        /* PANTALLA CENTRAL (LETRAS GRANDES) */
        #display-text {
            flex-grow: 1; padding: 30px; display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 36px; font-weight: bold; color: #ffffff;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); line-height: 1.3;
            text-shadow: 2px 2px 4px #000;
        }

        /* CONTROLES INFERIORES */
        .footer { 
            display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 15px; 
            padding: 35px 20px; background: #0a0a0a; border-top: 2px solid #1a1a1a;
            align-items: center;
        }
        .btn-circle {
            border-radius: 50%; border: none; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: 0.2s; color: white;
        }
        .btn-cam { background: #2a2a2a; height: 75px; width: 75px; font-size: 28px; border: 1px solid #444; }
        .btn-mic { 
            background: #cc0000; height: 110px; width: 110px; font-size: 50px;
            box-shadow: 0 0 20px #cc0000;
        }
        /* ESTADO ACTIVO MIC */
        .mic-on { background: var(--neon-matz) !important; color: black !important; box-shadow: 0 0 35px var(--neon-matz) !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="empresa">MULTISERVICIO ANATO SMG</div>
        <div class="matzumi">MATZUMI</div>
    </div>

    <div class="radar">
        <div id="ubicacion">📍 LOS GUAYOS...</div>
        <div id="temperatura">🌡️ --°C</div>
    </div>

    <div id="display-text">
        LISTA PARA LA ORDEN, AMO.
    </div>

    <div class="footer">
        <button class="btn-circle btn-cam" onclick="accion('FOTO')">📸</button>
        
        <button class="btn-circle btn-mic" id="main-mic" 
                onmousedown="startListening()" 
                onmouseup="stopListening()"
                ontouchstart="startListening()"
                ontouchend="stopListening()">🎤</button>
        
        <button class="btn-circle btn-cam" onclick="accion('VIDEO')">🎥</button>
    </div>

    <script>
        // Función para actualizar Radar cada 30 segundos
        function updateRadar() {
            // Ubicación fija según su zona
            document.getElementById('ubicacion').innerText = "📍 LOS GUAYOS, CAR";
            
            // Simulación de temperatura (esto se conectará a la API de clima)
            let tempSimulada = 24 + Math.floor(Math.random() * 6);
            document.getElementById('temperatura').innerText = `🌡️ ${tempSimulada}°C`;
        }

        setInterval(updateRadar, 30000); 
        updateRadar();

        function startListening() {
            document.getElementById('main-mic').classList.add('mic-on');
            document.getElementById('display-text').innerText = "DÍGAME, AMO. LO ESCUCHO...";
        }

        function stopListening() {
            document.getElementById('main-mic').classList.remove('mic-on');
            document.getElementById('display-text').innerText = "BUSCANDO EN LA BASE DE DATOS...";
            // Aquí dispararemos la consulta al Excel/Cerebro
        }

        function accion(tipo) {
            document.getElementById('display-text').innerText = `ACTIVANDO ${tipo}...`;
        }
    </script>
</body>
</html>
