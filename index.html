<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATZUMI V12 - MULTISERVICIOS ANATO SMG</title>
    <style>
        :root { --neon-blue: #00f2ff; --matsumi-green: #2ecc71; --bg-dark: #080808; }
        body { background: var(--bg-dark); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; }
        .header { text-align: center; border-bottom: 2px solid var(--matsumi-green); padding-bottom: 5px; margin-bottom: 10px; }
        .sensors { display: flex; justify-content: space-between; padding: 5px 10px; background: #111; border-radius: 5px; font-size: 14px; color: var(--neon-blue); }
        
        #monitor { 
            background: #000; border: 1px solid var(--matsumi-green); height: 120px; 
            border-radius: 5px; padding: 10px; overflow-y: auto; color: var(--matsumi-green); 
            font-size: 13px; box-shadow: inset 0 0 10px #003300; margin: 10px 0;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex-grow: 1; }
        .btn-smg { 
            background: #151515; border: 1px solid #444; color: #ccc; border-radius: 8px; 
            padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; transition: 0.2s;
        }
        .btn-smg:active { background: var(--matsumi-green); color: black; box-shadow: 0 0 15px var(--matsumi-green); }
        .btn-smg small { font-size: 9px; opacity: 0.7; margin-top: 4px; }

        .footer { display: flex; justify-content: space-around; align-items: center; padding: 15px 0; background: #111; border-radius: 20px 20px 0 0; }
        .action-btn { background: #222; border: 1px solid #444; color: white; width: 50px; height: 50px; border-radius: 50%; font-size: 22px; cursor: pointer; }
        .mic-main { width: 70px; height: 70px; background: var(--matsumi-green); color: black; border: none; border-radius: 50%; font-size: 30px; box-shadow: 0 0 20px var(--matsumi-green); }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 16px; color: var(--neon-blue);">MULTISERVICIO ANATO SMG</div>
    <div style="font-size: 12px; color: var(--matsumi-green);">Asistente MATZUMI V12</div>
</div>

<div class="sensors">
    <span>📍 LOS GUAYOS</span>
    <span id="temp">24°C</span>
</div>

<div id="monitor">> SISTEMA MATZUMI LISTA...<br>> ESPERANDO ÓRDENES, AMO.</div>

<div class="grid">
    <button class="btn-smg" onclick="run('AIRES')">❄️ AIRES<br><small>29 Marcas / Split / Inv</small></button>
    <button class="btn-smg" onclick="run('PROTO')">🛡️ PROTOCOLO<br><small>JVTRONIC / Amp</small></button>
    <button class="btn-smg" onclick="run('MURA')">⚡ MURACHI<br><small>10k uF / Toroidal</small></button>
    <button class="btn-smg" onclick="run('CLIE')">👥 CLIENTES<br><small>Zonas / Garantía</small></button>
    <button class="btn-smg" onclick="run('RADAR')">📡 RADAR<br><small>Clima / Lluvia</small></button>
    <button class="btn-smg" onclick="run('DINERO')">💰 COBRO<br><small>Tasa BCV / $40</small></button>
</div>

<div class="footer">
    <input type="file" accept="image/*" capture="environment" id="cam" style="display:none" onchange="file('Foto')">
    <button class="action-btn" onclick="document.getElementById('cam').click()">📷</button>
    
    <button class="mic-main" onclick="toggleMic()">🎤</button>
    
    <input type="file" accept="video/*" capture="environment" id="vid" style="display:none" onchange="file('Video')">
    <button class="action-btn" onclick="document.getElementById('vid').click()">🎥</button>
</div>

<script>
    const log = document.getElementById('monitor');
    function speak(t) {
        const s = window.speechSynthesis;
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'es-ES'; u.rate = 1; u.pitch = 1.1;
        s.speak(u);
    }

    function run(type) {
        let txt = "";
        if(type==='AIRES') txt = "Cargando marcas: Damasco, Green Plus, Arti y 29 más. Constante 17 activa.";
        if(type==='PROTO') txt = "Guía JVTRONIC: Seteé amperaje y voltajes de corte antes de arrancar.";
        if(type==='MURA') txt = "Proyecto Murachi: Banco de capacitores listo para el arranque, amo.";
        if(type==='RADAR') txt = "Radar: 24 grados en Los Guayos. Humedad alta, posible lluvia en breve.";
        if(type==='DINERO') txt = "Tarifa base: 40 dólares. Verificando tasa BCV actualizada.";
        if(type==='CLIE') txt = "Abriendo base de datos de clientes por zona y estatus de garantía.";

        log.innerHTML = `> SUBMENÚ: ${type}<br>> ${txt}`;
        speak(txt);
    }

    function file(tipo) {
        log.innerHTML += `<br>> ${tipo} capturado con éxito.`;
        speak(`${tipo} guardado, amo.`);
    }

    function toggleMic() {
        speak("Dígame, amo. Lo escucho.");
        log.innerHTML += "<br>> ESCUCHANDO REPORTE...";
    }
</script>

</body>
</html>
